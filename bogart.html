<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Portfolio</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f4f4f4;
      margin: 0;
      padding: 0;
    }
    .profile {
      margin-top: 50px;
    }
    .profile img {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 3px solid #333;
    }
    .profile-text {
      margin-top: 20px;
      font-size: 18px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="profile">
    <!-- Palitan mo yung src ng image file mo -->
    <img src="profile.jpg" alt="Profile Picture">
    <div class="profile-text">
      <p>Lagyan mo dito yung description mo, tulad ng "Hi, I'm Juan, a web developer passionate about design and coding."</p>
    </div>
  </div>
</body>
</html>
